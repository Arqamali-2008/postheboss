<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline Barcode Printing System</title>
    <script src="lock.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        /* ... Root and Reset ... */
        :root {
            --primary-color: #3498db;
            --secondary-color: #2c3e50;
            --success-color: #27ae60;
            --danger-color: #e74c3c;
            --warning-color: #f39c12;
            --light-bg: #f5f7fa;
            --dark-bg: #1a1a2e;
            --light-text: #333;
            --dark-text: #f5f5f5;
            --card-bg-light: #ffffff;
            --card-bg-dark: #2d3748;
            --border-light: #e2e8f0;
            --border-dark: #4a5568;

            /* ===== ZEBRA GT 800 DIMENSIONS ===== */
            --gt800-paper-width: 9.56cm;
            --gt800-sticker-width: 3cm;
            --gt800-sticker-height: 1.5cm;
            --gt800-gap-column: 0.2cm;
            /* D - horizontal gap */
            --gt800-gap-row: 0.3cm;
            /* E - vertical gap */
            --gt800-stickers-per-row: 3;
            /* Side margin: (9.56 - (3*3 + 2*0.2)) / 2 = 0.08cm */
            --gt800-side-margin: 0.08cm;
        }

        [data-theme="light"] {
            --bg-color: var(--light-bg);
            --text-color: var(--light-text);
            --card-bg: var(--card-bg-light);
            --border-color: var(--border-light);
            --sticker-bg: #ffffff;
            --sticker-text: #000000;
        }

        [data-theme="dark"] {
            --bg-color: var(--dark-bg);
            --text-color: var(--dark-text);
            --card-bg: var(--card-bg-dark);
            --border-color: var(--border-dark);
            --sticker-bg: #ffffff;
            /* Stickers always white for printing */
            --sticker-text: #000000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s, color 0.3s;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        h1 {
            color: var(--primary-color);
            font-size: 2rem;
        }

        .theme-toggle {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .theme-toggle:hover {
            background: var(--primary-color);
            color: white;
        }

        .card {
            background: var(--card-bg);
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }

        .card-title {
            font-size: 1.25rem;
            margin-bottom: 15px;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: var(--card-bg);
            color: var(--text-color);
            font-size: 1rem;
        }

        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background: #2980b9;
        }

        .btn-success {
            background: var(--success-color);
            color: white;
        }

        .btn-success:hover {
            background: #219653;
        }

        .btn-danger {
            background: var(--danger-color);
            color: white;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .form-row {
            display: flex;
            gap: 15px;
        }

        .form-row .form-group {
            flex: 1;
        }

        .preview-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }

        .preview-label {
            margin-bottom: 10px;
            font-weight: 500;
        }

        /* ===== DIMENSION INFO BOX ===== */
        .dimension-info {
            background: rgba(52, 152, 219, 0.1);
            border: 1px solid var(--primary-color);
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 15px;
            font-size: 0.85rem;
            display: none;
        }

        .dimension-info.active {
            display: block;
        }

        .dimension-info .dim-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 4px 16px;
            margin-top: 6px;
        }

        .dimension-info .dim-item {
            display: flex;
            justify-content: space-between;
        }

        .dimension-info .dim-label {
            font-weight: 600;
            color: var(--primary-color);
        }

        /* ----- STICKER STYLES ----- */
        .sticker {
            border: 1px solid #ccc;
            background: var(--sticker-bg);
            color: var(--sticker-text);
            position: relative;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            page-break-inside: avoid;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        /* ===== ZEBRA GT 800 - 3cm × 1.5cm ===== */
        .sticker.gt800 {
            width: var(--gt800-sticker-width);
            height: var(--gt800-sticker-height);
            padding: 1mm 1.5mm;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* GT800 Internal Layout */
        .gt800-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            line-height: 1;
        }

        .gt800-row.top {
            /* Shop + Item */
        }

        .gt800-row.middle {
            flex-grow: 1;
            align-items: center;
        }

        .gt800-row.bottom {
            /* Code + Secret */
        }

        /* GT800 text classes */
        .gt800-shop {
            font-family: 'Segoe UI', Arial, sans-serif;
            font-weight: 700;
            font-size: 6.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 55%;
            text-transform: uppercase;
        }

        .gt800-item {
            font-family: 'Segoe UI', Arial, sans-serif;
            font-weight: 600;
            font-size: 6.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 42%;
            text-align: right;
        }

        .gt800-barcode-container {
            flex-grow: 1;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            height: 100%;
            max-width: 60%;
        }

        .gt800-barcode-container img {
            height: 20px;
            width: auto;
            max-width: 100%;
        }

        .gt800-price {
            font-family: 'Courier New', monospace;
            font-weight: 900;
            font-size: 9px;
            text-align: right;
            white-space: nowrap;
        }

        .gt800-code {
            font-family: 'Courier New', monospace;
            font-size: 5.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 58%;
        }

        .gt800-secret {
            font-family: 'Courier New', monospace;
            font-size: 5.5px;
            font-style: italic;
            text-align: right;
            white-space: nowrap;
            max-width: 40%;
        }

        /* ===== GT800 Print Grid (3 per row) ===== */
        .gt800-print-grid {
            width: var(--gt800-paper-width);
            display: flex;
            flex-wrap: wrap;
            padding: 0 var(--gt800-side-margin);
            gap: 0;
            /* We use margins for precise control */
        }

        .gt800-print-grid .sticker.gt800 {
            margin-right: var(--gt800-gap-column);
            margin-bottom: var(--gt800-gap-row);
            border: none;
            box-shadow: none;
        }

        /* Remove right margin on every 3rd sticker */
        .gt800-print-grid .sticker.gt800:nth-child(3n) {
            margin-right: 0;
        }

        /* ===== LEGACY SIZES ===== */
        .sticker.small {
            width: 2in;
            height: 1in;
            padding: 2px;
        }

        .sticker.zebra-2x1 {
            width: 2in;
            height: 1in;
            padding: 2px;
        }

        .sticker.large {
            width: 3in;
            height: 2in;
            padding: 5px;
        }

        .sticker.roll-square {
            width: 1in;
            height: 1in;
            padding: 2px;
        }

        .sticker.roll-rectangle {
            width: 1in;
            height: 0.5in;
            padding: 1px;
        }

        /* Legacy tiny layout (kept for backwards compat) */
        .sticker.tiny-layout {
            width: 3cm;
            height: 1.5cm;
            padding: 1mm 2mm;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Standard Vertical Stack Styles */
        .sticker:not(.tiny-layout):not(.gt800) {
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 1px;
        }

        /* Tiny Layout Internal Structure */
        .tiny-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            line-height: 1;
        }

        .tiny-row.middle {
            flex-grow: 1;
            align-items: center;
        }

        .tiny-text {
            font-family: 'Segoe UI', sans-serif;
            font-weight: bold;
            font-size: 7px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 48%;
        }

        .tiny-price {
            font-family: 'Courier New', monospace;
            font-weight: 900;
            font-size: 9px;
            text-align: right;
        }

        .tiny-code {
            font-family: 'Courier New', monospace;
            font-size: 6px;
        }

        .tiny-barcode-container {
            flex-grow: 1;
            display: flex;
            justify-content: flex-start;
            height: 100%;
            max-width: 65%;
        }

        .tiny-barcode-container img {
            height: 22px;
            width: auto;
            max-width: 100%;
        }

        /* Standard Lines (for non-tiny/non-gt800 layouts) */
        .line-shop {
            font-weight: bold;
            font-family: 'Segoe UI', sans-serif;
            white-space: nowrap;
            width: 100%;
        }

        .line-item {
            font-weight: 600;
            font-family: 'Segoe UI', sans-serif;
            white-space: nowrap;
            width: 100%;
        }

        .line-barcode {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            flex-grow: 1;
            max-height: 50%;
        }

        .line-barcode img {
            max-width: 95%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
        }

        .line-code {
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
        }

        .line-price {
            font-weight: bold;
            font-family: 'Courier New', monospace;
        }

        .line-secret {
            font-family: 'Courier New', monospace;
            font-style: italic;
        }

        /* Font Sizing for Standard Layouts */
        .sticker.small,
        .sticker.zebra-2x1 {
            font-size: 10px;
        }

        .sticker.small .line-shop,
        .sticker.zebra-2x1 .line-shop {
            font-size: 11px;
        }

        .sticker.large {
            font-size: 14px;
        }

        .history-container {
            max-height: 300px;
            overflow-y: auto;
        }

        .history-item {
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-info {
            display: flex;
            flex-direction: column;
        }

        .history-actions {
            display: flex;
            gap: 5px;
        }

        .print-preview {
            display: none;
        }

        /* ===== PRINT STYLES ===== */
        @media print {
            body * {
                visibility: hidden;
            }

            .print-preview,
            .print-preview * {
                visibility: visible;
            }

            .print-preview {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                display: block;
                padding: 0;
                margin: 0;
            }

            .sticker {
                page-break-inside: avoid;
                break-inside: avoid;
                border: none !important;
                box-shadow: none !important;
            }

            .sticker * {
                color: black !important;
            }

            /* GT800 Print: exact paper width grid */
            .gt800-print-grid {
                width: var(--gt800-paper-width);
                padding: 0 var(--gt800-side-margin);
            }

            .gt800-print-grid .sticker.gt800 {
                margin-right: var(--gt800-gap-column);
                margin-bottom: var(--gt800-gap-row);
                margin-top: 0;
                margin-left: 0;
            }

            .gt800-print-grid .sticker.gt800:nth-child(3n) {
                margin-right: 0;
            }

            /* Zebra 2x1 single per row */
            .sticker.zebra-2x1 {
                page-break-after: always;
                margin: 0 auto;
            }

            /* Legacy tiny layouts */
            .sticker.zebra-3x1-5cm-3row,
            .sticker.zebra-3x1-5cm-4row {
                page-break-after: auto;
                margin-right: 2mm;
                margin-bottom: 2mm;
            }

            .sticker.zebra-3x1-5cm {
                page-break-after: always;
                margin: 0 auto;
            }

            @page {
                size: auto;
                margin: 0;
            }
        }

        @media (max-width: 768px) {
            .form-row {
                flex-direction: column;
                gap: 0;
            }

            header {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }
        }

        /* ===== Preview Scale Helper ===== */
        .preview-scale-note {
            font-size: 0.8rem;
            color: var(--primary-color);
            margin-top: 8px;
            text-align: center;
            opacity: 0.8;
        }

        /* Preview wrapper to show paper boundary */
        .paper-preview {
            border: 2px dashed var(--primary-color);
            border-radius: 4px;
            padding: var(--gt800-side-margin);
            width: var(--gt800-paper-width);
            display: flex;
            flex-wrap: wrap;
            gap: 0;
            background: repeating-linear-gradient(45deg,
                    transparent,
                    transparent 10px,
                    rgba(52, 152, 219, 0.03) 10px,
                    rgba(52, 152, 219, 0.03) 20px);
            position: relative;
        }

        .paper-preview .sticker.gt800 {
            margin-right: var(--gt800-gap-column);
            margin-bottom: var(--gt800-gap-row);
        }

        .paper-preview .sticker.gt800:nth-child(3n) {
            margin-right: 0;
        }

        .paper-width-label {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            color: var(--primary-color);
            font-weight: 600;
            white-space: nowrap;
        }
    </style>
</head>

<body data-theme="light">
    <div class="container">
        <header>
            <h1>Offline Barcode Printing System</h1>
            <button class="theme-toggle" id="themeToggle"><span id="themeIcon">🌙</span> <span id="themeText">Dark
                    Mode</span></button>
        </header>

        <div class="card">
            <h2 class="card-title">Barcode Information</h2>
            <div class="form-row">
                <div class="form-group"><label for="shopName">Shop Name</label><input type="text" id="shopName"
                        placeholder="Enter shop name"></div>
                <div class="form-group"><label for="itemName">Item Name</label><input type="text" id="itemName"
                        placeholder="Enter item name"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label for="barcodeCode">Barcode Code</label><input type="text" id="barcodeCode"
                        placeholder="Enter barcode code"></div>
                <div class="form-group"><label for="price">Price</label><input type="text" id="price"
                        placeholder="0.00"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label for="secretCode">Secret Code</label><input type="text" id="secretCode"
                        placeholder="Enter secret code"></div>
                <div class="form-group">
                    <label for="stickerSize">Sticker Size</label>
                    <select id="stickerSize">
                        <option value="gt800-3col">⭐ Zebra GT 800 (3cm × 1.5cm) - 3 per row [9.56cm paper]</option>
                        <option value="gt800-1col">Zebra GT 800 (3cm × 1.5cm) - 1 per row</option>
                        <option value="zebra-3x1-5cm">Legacy Zebra (3cm × 1.5cm) - 1 per row</option>
                        <option value="zebra-3x1-5cm-3row">Legacy Zebra (3cm × 1.5cm) - 3 per row</option>
                        <option value="zebra-3x1-5cm-4row">Legacy Zebra (3cm × 1.5cm) - 4 per row</option>
                        <option value="zebra-2x1">Zebra GT 800 (2×1 inch) - 1 per row</option>
                        <option value="small">Small (2×1 inch) - 4 per row</option>
                        <option value="large">Large (3×2 inch) - 2 per row</option>
                        <option value="roll-square">Roll Square (1×1 inch) - 6 per row</option>
                        <option value="roll-rectangle">Roll Rectangle (1×0.5 inch) - 3 per row</option>
                    </select>
                </div>
                <div class="form-group"><label for="quantity">Quantity</label><input type="number" id="quantity" min="1"
                        value="1"></div>
            </div>

            <!-- Dimension Info Box for GT800 -->
            <div class="dimension-info" id="dimensionInfo">
                <strong>📐 Zebra GT 800 Paper Setup:</strong>
                <div class="dim-grid">
                    <div class="dim-item"><span class="dim-label">A - Paper Width:</span> <span>9.56cm</span></div>
                    <div class="dim-item"><span class="dim-label">B - Sticker Width:</span> <span>3cm</span></div>
                    <div class="dim-item"><span class="dim-label">C - Sticker Height:</span> <span>1.5cm</span></div>
                    <div class="dim-item"><span class="dim-label">D - Col Gap:</span> <span>0.2cm</span></div>
                    <div class="dim-item"><span class="dim-label">E - Row Gap:</span> <span>0.3cm</span></div>
                    <div class="dim-item"><span class="dim-label">Stickers/Row:</span> <span>3</span></div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group"><button class="btn btn-primary" id="generatePreview">Generate Preview</button>
                </div>
                <div class="form-group"><button class="btn btn-success" id="printStickers">Print Stickers</button></div>
            </div>
        </div>

        <div class="card">
            <h2 class="card-title">Live Preview</h2>
            <div class="preview-container">
                <div class="preview-label">Sticker Preview (True to Scale)</div>
                <div id="stickerPreview"></div>
                <div class="preview-scale-note" id="previewScaleNote"></div>
            </div>
        </div>

        <div class="card">
            <h2 class="card-title">Print History</h2>
            <div class="history-container" id="historyContainer"></div>
            <div style="margin-top: 15px;"><button class="btn btn-danger" id="clearHistory">Clear History</button></div>
        </div>
    </div>

    <div class="print-preview" id="printPreview"></div>
    <canvas id="barcodeCanvas" style="display: none;"></canvas>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const savedTheme = localStorage.getItem('barcodeTheme') || 'light';
            document.body.setAttribute('data-theme', savedTheme);
            updateThemeToggle(savedTheme);
            loadFormData();
            loadPrintHistory();
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);
            document.getElementById('generatePreview').addEventListener('click', generatePreview);
            document.getElementById('printStickers').addEventListener('click', printStickers);
            document.getElementById('clearHistory').addEventListener('click', clearHistory);
            document.getElementById('stickerSize').addEventListener('change', function () {
                updateDimensionInfo();
                generatePreview();
                saveFormData();
            });
            const formInputs = document.querySelectorAll('input');
            formInputs.forEach(input => { input.addEventListener('input', saveFormData); });
            updateDimensionInfo();
            generatePreview();
        });

        function toggleTheme() {
            const currentTheme = document.body.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.body.setAttribute('data-theme', newTheme);
            localStorage.setItem('barcodeTheme', newTheme);
            updateThemeToggle(newTheme);
        }

        function updateThemeToggle(theme) {
            const themeIcon = document.getElementById('themeIcon');
            const themeText = document.getElementById('themeText');
            if (theme === 'light') { themeIcon.textContent = '🌙'; themeText.textContent = 'Dark Mode'; }
            else { themeIcon.textContent = '☀️'; themeText.textContent = 'Light Mode'; }
        }

        function updateDimensionInfo() {
            const size = document.getElementById('stickerSize').value;
            const info = document.getElementById('dimensionInfo');
            const note = document.getElementById('previewScaleNote');
            if (size.startsWith('gt800')) {
                info.classList.add('active');
                note.textContent = '📐 Preview shown at actual print scale (1:1). Paper width: 9.56cm';
            } else {
                info.classList.remove('active');
                note.textContent = '';
            }
        }

        function saveFormData() {
            const formData = {
                shopName: document.getElementById('shopName').value,
                itemName: document.getElementById('itemName').value,
                barcodeCode: document.getElementById('barcodeCode').value,
                price: document.getElementById('price').value,
                secretCode: document.getElementById('secretCode').value,
                stickerSize: document.getElementById('stickerSize').value,
                quantity: document.getElementById('quantity').value
            };
            localStorage.setItem('barcodeFormData', JSON.stringify(formData));
        }

        function loadFormData() {
            const savedData = localStorage.getItem('barcodeFormData');
            if (savedData) {
                const formData = JSON.parse(savedData);
                document.getElementById('shopName').value = formData.shopName || '';
                document.getElementById('itemName').value = formData.itemName || '';
                document.getElementById('barcodeCode').value = formData.barcodeCode || '';
                document.getElementById('price').value = formData.price || '';
                document.getElementById('secretCode').value = formData.secretCode || '';
                // Handle migration from old size values
                const sizeSelect = document.getElementById('stickerSize');
                const savedSize = formData.stickerSize || 'gt800-3col';
                const optionExists = Array.from(sizeSelect.options).some(o => o.value === savedSize);
                sizeSelect.value = optionExists ? savedSize : 'gt800-3col';
                document.getElementById('quantity').value = formData.quantity || 1;
            }
        }

        function loadPrintHistory() {
            const historyContainer = document.getElementById('historyContainer');
            const history = JSON.parse(localStorage.getItem('barcodePrintHistory') || '[]');
            historyContainer.innerHTML = '';
            if (history.length === 0) { historyContainer.innerHTML = '<p>No print history yet.</p>'; return; }
            history.forEach((item, index) => {
                const historyItem = document.createElement('div');
                historyItem.className = 'history-item';
                historyItem.innerHTML = `
                    <div class="history-info">
                        <strong>${item.shopName}</strong>
                        <div>${item.itemName || 'No Item Name'}</div>
                        <div>Barcode: ${item.barcodeCode} | Price: ${item.price}</div>
                        <small>${new Date(item.timestamp).toLocaleString()}</small>
                    </div>
                    <div class="history-actions"><button class="btn btn-primary" onclick="reuseHistoryItem(${index})">Reuse</button></div>
                `;
                historyContainer.appendChild(historyItem);
            });
        }

        function addToPrintHistory(data) {
            const history = JSON.parse(localStorage.getItem('barcodePrintHistory') || '[]');
            history.unshift({
                shopName: data.shopName, itemName: data.itemName, barcodeCode: data.barcodeCode,
                price: data.price, secretCode: data.secretCode, stickerSize: data.stickerSize,
                quantity: data.quantity, timestamp: new Date().toISOString()
            });
            if (history.length > 10) history.splice(10);
            localStorage.setItem('barcodePrintHistory', JSON.stringify(history));
            loadPrintHistory();
        }

        function clearHistory() {
            if (confirm('Are you sure you want to clear the print history?')) {
                localStorage.removeItem('barcodePrintHistory');
                loadPrintHistory();
            }
        }

        function reuseHistoryItem(index) {
            const history = JSON.parse(localStorage.getItem('barcodePrintHistory') || '[]');
            const item = history[index];
            document.getElementById('shopName').value = item.shopName;
            document.getElementById('itemName').value = item.itemName || '';
            document.getElementById('barcodeCode').value = item.barcodeCode;
            document.getElementById('price').value = item.price;
            document.getElementById('secretCode').value = item.secretCode;
            const sizeSelect = document.getElementById('stickerSize');
            const optionExists = Array.from(sizeSelect.options).some(o => o.value === item.stickerSize);
            sizeSelect.value = optionExists ? item.stickerSize : 'gt800-3col';
            document.getElementById('quantity').value = item.quantity;
            saveFormData();
            updateDimensionInfo();
            generatePreview();
        }

        function generateBarcode(barcodeValue, width, height) {
            return new Promise((resolve) => {
                const canvas = document.getElementById('barcodeCanvas');
                const ctx = canvas.getContext('2d');
                canvas.width = width;
                canvas.height = height;
                try {
                    JsBarcode(canvas, barcodeValue, {
                        format: "CODE128", displayValue: false, width: 2, height: height, margin: 0, background: "#ffffff", lineColor: "#000000"
                    });
                    resolve(canvas.toDataURL('image/png'));
                } catch (error) {
                    console.error('Barcode error:', error);
                    ctx.fillStyle = 'white'; ctx.fillRect(0, 0, width, height); ctx.fillStyle = 'black';
                    for (let i = 0; i < width; i += 4) { if (Math.random() > 0.5) ctx.fillRect(i, 0, 2, height); }
                    resolve(canvas.toDataURL('image/png'));
                }
            });
        }

        async function generatePreview() {
            const shopName = document.getElementById('shopName').value || 'CITY PLAZA';
            const itemName = document.getElementById('itemName').value || 'SHORT';
            const barcodeCode = document.getElementById('barcodeCode').value || '09-C-2-26-90550RTN';
            const price = document.getElementById('price').value || '895.00';
            const secretCode = document.getElementById('secretCode').value || 'SECRET';
            const stickerSize = document.getElementById('stickerSize').value;
            const previewContainer = document.getElementById('stickerPreview');
            previewContainer.innerHTML = '';

            if (stickerSize === 'gt800-3col') {
                // Show a paper-width preview with 3 stickers (one row)
                const paperPreview = document.createElement('div');
                paperPreview.className = 'paper-preview';

                const widthLabel = document.createElement('div');
                widthLabel.className = 'paper-width-label';
                widthLabel.textContent = 'Paper Width: 9.56cm';
                paperPreview.appendChild(widthLabel);

                for (let i = 0; i < 3; i++) {
                    const sticker = await createStickerElement(shopName, itemName, barcodeCode, price, secretCode, stickerSize);
                    paperPreview.appendChild(sticker);
                }
                previewContainer.appendChild(paperPreview);
            } else {
                const sticker = await createStickerElement(shopName, itemName, barcodeCode, price, secretCode, stickerSize);
                previewContainer.appendChild(sticker);
            }
        }

        async function createStickerElement(shopName, itemName, barcodeCode, price, secretCode, size) {
            const isGT800 = size.startsWith('gt800');
            const isTiny = !isGT800 && size.includes('zebra-3x1-5cm');

            const sticker = document.createElement('div');

            if (isGT800) {
                sticker.className = 'sticker gt800';

                // --- GT800 Layout: matches physical label exactly ---
                // Row 1: Shop Name (left) | Item Name (right)
                const row1 = document.createElement('div');
                row1.className = 'gt800-row top';

                const shopSpan = document.createElement('span');
                shopSpan.className = 'gt800-shop';
                shopSpan.textContent = shopName;

                const itemSpan = document.createElement('span');
                itemSpan.className = 'gt800-item';
                itemSpan.textContent = itemName;

                row1.appendChild(shopSpan);
                row1.appendChild(itemSpan);
                sticker.appendChild(row1);

                // Row 2: Barcode (left ~60%) | Price (right ~40%)
                const row2 = document.createElement('div');
                row2.className = 'gt800-row middle';

                const barcodeContainer = document.createElement('div');
                barcodeContainer.className = 'gt800-barcode-container';
                const barcodeDataURL = await generateBarcode(barcodeCode, 100, 22);
                const barcodeImg = document.createElement('img');
                barcodeImg.src = barcodeDataURL;
                barcodeContainer.appendChild(barcodeImg);

                const priceSpan = document.createElement('span');
                priceSpan.className = 'gt800-price';
                priceSpan.textContent = price;

                row2.appendChild(barcodeContainer);
                row2.appendChild(priceSpan);
                sticker.appendChild(row2);

                // Row 3: Barcode Code (left) | Secret Code (right)
                const row3 = document.createElement('div');
                row3.className = 'gt800-row bottom';

                const codeSpan = document.createElement('span');
                codeSpan.className = 'gt800-code';
                codeSpan.textContent = barcodeCode;

                const secretSpan = document.createElement('span');
                secretSpan.className = 'gt800-secret';
                secretSpan.textContent = secretCode;

                row3.appendChild(codeSpan);
                row3.appendChild(secretSpan);
                sticker.appendChild(row3);

            } else if (isTiny) {
                // --- Legacy Tiny Layout Logic (Row based) ---
                sticker.className = `sticker ${size} tiny-layout`;

                const row1 = document.createElement('div');
                row1.className = 'tiny-row';
                const shopSpan = document.createElement('span');
                shopSpan.className = 'tiny-text';
                shopSpan.textContent = shopName;
                shopSpan.style.textAlign = 'left';
                const itemSpan = document.createElement('span');
                itemSpan.className = 'tiny-text';
                itemSpan.textContent = itemName;
                itemSpan.style.textAlign = 'right';
                row1.appendChild(shopSpan);
                row1.appendChild(itemSpan);
                sticker.appendChild(row1);

                const row2 = document.createElement('div');
                row2.className = 'tiny-row middle';
                const barcodeContainer = document.createElement('div');
                barcodeContainer.className = 'tiny-barcode-container';
                const barcodeDataURL = await generateBarcode(barcodeCode, 100, 25);
                const barcodeImg = document.createElement('img');
                barcodeImg.src = barcodeDataURL;
                barcodeContainer.appendChild(barcodeImg);
                const priceSpan = document.createElement('span');
                priceSpan.className = 'tiny-price';
                priceSpan.textContent = `LKR ${price}`;
                row2.appendChild(barcodeContainer);
                row2.appendChild(priceSpan);
                sticker.appendChild(row2);

                const row3 = document.createElement('div');
                row3.className = 'tiny-row';
                const codeSpan = document.createElement('span');
                codeSpan.className = 'tiny-code';
                codeSpan.textContent = barcodeCode;
                codeSpan.style.textAlign = 'left';
                const secretSpan = document.createElement('span');
                secretSpan.className = 'tiny-code';
                secretSpan.textContent = secretCode;
                secretSpan.style.textAlign = 'right';
                row3.appendChild(codeSpan);
                row3.appendChild(secretSpan);
                sticker.appendChild(row3);

            } else {
                // --- Standard Stack Layout Logic ---
                sticker.className = `sticker ${size}`;

                const shopDiv = document.createElement('div'); shopDiv.className = 'line-shop'; shopDiv.textContent = shopName; sticker.appendChild(shopDiv);
                const itemDiv = document.createElement('div'); itemDiv.className = 'line-item'; itemDiv.textContent = itemName; sticker.appendChild(itemDiv);

                const barcodeContainer = document.createElement('div'); barcodeContainer.className = 'line-barcode';
                let bWidth = 200, bHeight = 40;
                if (size === 'roll-rectangle') { bWidth = 100; bHeight = 20; }
                const barcodeDataURL = await generateBarcode(barcodeCode, bWidth, bHeight);
                const barcodeImg = document.createElement('img'); barcodeImg.src = barcodeDataURL;
                barcodeContainer.appendChild(barcodeImg); sticker.appendChild(barcodeContainer);

                const codeDiv = document.createElement('div'); codeDiv.className = 'line-code'; codeDiv.textContent = barcodeCode; sticker.appendChild(codeDiv);
                const priceDiv = document.createElement('div'); priceDiv.className = 'line-price'; priceDiv.textContent = `LKR ${price}`; sticker.appendChild(priceDiv);
                const secretDiv = document.createElement('div'); secretDiv.className = 'line-secret'; secretDiv.textContent = secretCode; sticker.appendChild(secretDiv);
            }

            return sticker;
        }

        async function printStickers() {
            try {
                const shopName = document.getElementById('shopName').value;
                const itemName = document.getElementById('itemName').value;
                const barcodeCode = document.getElementById('barcodeCode').value;
                const price = document.getElementById('price').value;
                const secretCode = document.getElementById('secretCode').value;
                const stickerSize = document.getElementById('stickerSize').value;
                const quantity = parseInt(document.getElementById('quantity').value) || 1;

                if (!shopName || !barcodeCode || !price) { alert('Please fill in vital info (Shop, Barcode, Price).'); return; }
                addToPrintHistory({ shopName, itemName, barcodeCode, price, secretCode, stickerSize, quantity });
                const printPreview = document.getElementById('printPreview'); printPreview.innerHTML = '';

                if (stickerSize === 'gt800-3col') {
                    // ===== GT800 3-per-row PRINT =====
                    const printGrid = document.createElement('div');
                    printGrid.className = 'gt800-print-grid';

                    for (let i = 0; i < quantity; i++) {
                        const sticker = await createStickerElement(shopName, itemName, barcodeCode, price, secretCode, stickerSize);
                        printGrid.appendChild(sticker);
                    }
                    printPreview.appendChild(printGrid);

                } else if (stickerSize === 'gt800-1col') {
                    // ===== GT800 1-per-row PRINT =====
                    const printContainer = document.createElement('div');
                    printContainer.style.display = 'flex';
                    printContainer.style.flexDirection = 'column';
                    printContainer.style.alignItems = 'center';
                    printContainer.style.gap = '0';
                    printContainer.style.padding = '0';

                    for (let i = 0; i < quantity; i++) {
                        const sticker = await createStickerElement(shopName, itemName, barcodeCode, price, secretCode, stickerSize);
                        sticker.style.marginBottom = 'var(--gt800-gap-row)';
                        printContainer.appendChild(sticker);
                    }
                    printPreview.appendChild(printContainer);

                } else {
                    // ===== LEGACY LAYOUTS =====
                    let stickersPerRow = 4;
                    if (stickerSize === 'zebra-2x1' || stickerSize === 'zebra-3x1-5cm') stickersPerRow = 1;
                    else if (stickerSize === 'zebra-3x1-5cm-3row') stickersPerRow = 3;
                    else if (stickerSize === 'zebra-3x1-5cm-4row') stickersPerRow = 4;
                    else if (stickerSize === 'large') stickersPerRow = 2;
                    else if (stickerSize === 'roll-square') stickersPerRow = 6;
                    else if (stickerSize === 'roll-rectangle') stickersPerRow = 3;

                    const printContainer = document.createElement('div');
                    printContainer.style.display = 'flex'; printContainer.style.flexWrap = 'wrap';

                    if (stickerSize.includes('zebra')) {
                        printContainer.style.gap = '0';
                        printContainer.style.padding = '0';
                        printContainer.style.justifyContent = 'flex-start';
                    } else {
                        printContainer.style.gap = '0.1in'; printContainer.style.padding = '0.5in'; printContainer.style.justifyContent = 'flex-start';
                    }

                    for (let i = 0; i < quantity; i++) {
                        const sticker = await createStickerElement(shopName, itemName, barcodeCode, price, secretCode, stickerSize);
                        printContainer.appendChild(sticker);

                        if ((i + 1) % stickersPerRow === 0 && (i + 1) !== quantity) {
                            const breakElement = document.createElement('div');
                            breakElement.style.width = '100%'; breakElement.style.height = '0';
                            printContainer.appendChild(breakElement);
                        }
                    }
                    printPreview.appendChild(printContainer);
                }

                window.print();
            } catch (error) { console.error("Print Error:", error); alert("Error: " + error.message); }
        }
    </script>
