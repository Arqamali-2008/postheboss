<!DOCTYPE html>
<html>
<head>
    <style>
         body { margin:0; background:#000; overflow:hidden; }
    .stage {
      position: fixed; inset: 0;
      display:flex; align-items:center; justify-content:center;
      background: #000;
      color: #9dffbe;
      font-family: 'Roboto Mono', monospace;
    }
    video {
      position:absolute; inset:0;
      width:100%; height:100%;
      object-fit: cover;
      filter: contrast(1.08) saturate(1.1);
    }
    .overlay {
      position: relative;
      z-index: 2;
      width: min(980px, 92vw);
      padding: 28px 20px;
      border: 1px solid rgba(0,255,136,0.28);
      background: linear-gradient(180deg, rgba(0,0,0,0.55), rgba(0,0,0,0.25));
      box-shadow: 0 0 40px rgba(0,255,136,0.12);
      backdrop-filter: blur(6px);
    }
    .title {
      font-size: 20px;
      letter-spacing: 3px;
      color:#d7ffe7;
      text-transform: uppercase;
      text-shadow: 0 0 16px rgba(0,255,136,0.35);
      margin-bottom: 10px;
    }
    .log {
      font-size: 13px;
      line-height: 1.5;
      color:#9dffbe;
      white-space: pre-wrap;
    }
    .boot-logo {
      position: absolute;
      top: 24px;
      right: 24px;
      z-index: 4;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border: 1px solid rgba(0,255,136,0.35);
      background: rgba(0,0,0,0.45);
      box-shadow: 0 0 20px rgba(0,255,136,0.2);
      animation: logoPulse 1.2s ease-in-out infinite alternate;
    }
    .boot-logo img {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      box-shadow: 0 0 12px rgba(0,255,136,0.3);
    }
    .boot-logo span {
      font-size: 11px;
      letter-spacing: 1.6px;
      color: #dcffe9;
      text-transform: uppercase;
      font-weight: 700;
    }
    .scanlines {
      position:absolute; inset:0;
      z-index: 1;
      background: repeating-linear-gradient(
        to bottom,
        rgba(120, 255, 170, 0.08) 0px,
        rgba(120, 255, 170, 0.08) 1px,
        rgba(0, 0, 0, 0) 3px,
        rgba(0, 0, 0, 0) 4px
      );
      opacity: 0.35;
      pointer-events:none;
      animation: flicker 0.12s steps(2,end) infinite;
    }
    .transition {
      position:absolute; inset:0;
      z-index: 3;
      pointer-events:none;
      opacity: 0;
      background:
        radial-gradient(circle at 50% 50%, rgba(0,255,136,0.35) 0%, rgba(0,255,136,0) 55%),
        linear-gradient(90deg, rgba(0,255,136,0.12), rgba(0,0,0,0.85));
      animation: none;
    }
    @keyframes flicker { 0%,100%{opacity:.38} 50%{opacity:.26} }
    @keyframes hardCut {
      0% { opacity: 0; transform: scale(1); }
      8% { opacity: 1; transform: scale(1.02); }
      40% { opacity: 0.2; }
      100% { opacity: 0; transform: scale(1.03); }
    }
    @keyframes logoPulse {
      from { transform: translateY(0) scale(1); box-shadow: 0 0 16px rgba(0,255,136,0.15); }
      to { transform: translateY(-1px) scale(1.03); box-shadow: 0 0 24px rgba(0,255,136,0.35); }
    }
    </style>

</head>

<a href="src/first-show.html"> 

<body style="background:black; color:#00ff9c; display:flex; justify-content:center; align-items:center; height:100vh;">



<script>
function go(){
  localStorage.setItem("audioUnlocked","true");
  window.location.href = "first-show.html";
}
</script>

<div class="stage" id="stage">
  <video id="vid" autoplay muted playsinline></video>
  <div class="scanlines"></div>
  <div class="transition" id="trans"></div>
  <div class="overlay">
    <div class="title" id="title"><center><button onclick="go()" style="padding:15px 30px; font-size:18px; background:black; color:#00ff9c; border:1px solid #00ff9c;">
      START SYSTEM
      </button></center></div>
    <div class="log" id="log"></div>
  </div>
 
  <div class="boot-logo">
    <img src="icon.png" alt="POS">
    <span>POS The Boss</span>
 
  </div>
</div>


</body>
</a>

</html>
